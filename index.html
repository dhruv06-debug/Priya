<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>For Priya ✨</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f3dfe4;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 25px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 420px;
            text-align: center;
            border: 2px solid #ff9eb5;
        }

        /* ✅ FIXED IMAGE STYLE */
        .main-photo {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            object-fit: cover;
            object-position: center; /* changed from center top */
            border: 6px solid #ff9eb5;
            box-shadow: 0 10px 25px rgba(255, 64, 129, 0.3);
            margin-bottom: 25px;
        }

        h1 {
            color: #e91e63;
            margin-bottom: 10px;
            font-size: 2.3rem;
        }

        p {
            color: #555;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .cute {
            color: #ff4081;
            font-weight: bold;
        }

        .btn {
            background: linear-gradient(45deg, #ff4081, #ff6b9a);
            border: none;
            padding: 14px 30px;
            border-radius: 50px;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.07);
            box-shadow: 0 8px 20px rgba(255, 64, 129, 0.4);
        }

        .hidden {
            display: none;
        }

        @media (max-width: 480px) {
            .main-photo {
                width: 180px;
                height: 180px;
            }
        }
    </style>
</head>

<body>

    <div class="container" id="mainBox">
        <img src="p.jpeg" alt="Priya Photo" class="main-photo">
        <h1>Hey Priya! ✨</h1>
        <p>You look <span class="cute">Cute</span> Today lol</p>
        <button class="btn" onclick="showMessage()">Click here</button>
    </div>

    <div class="container hidden" id="studyBox">
        <h1>Ab toh taarif hogai...</h1>
        <p>Now <strong>Get back to study!</strong> 📚✍️</p>
        <button class="btn" onclick="location.reload()">Back to cute mode</button>
    </div>

    <script>
        function showMessage() {
            document.getElementById("mainBox").style.display = "none";
            document.getElementById("studyBox").style.display = "block";
        }
    </script>

</body>
</html>
